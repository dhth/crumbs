version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 2 4,18 * *"
    groups:
      patch-updates:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "build"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 5 4,18 * *"
    labels:
      - "dependencies"
    commit-message:
      prefix: "ci"
